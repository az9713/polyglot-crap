name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Job 1: Formatting ────────────────────────────────────────────────────────
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Job 2: Build, test, clippy — matrix across all three OSes ───────────────
  test:
    name: Test (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # keep running other OSes if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Cache compiled dependencies — tree-sitter grammars compile ~12 C files,
      # so this typically saves 3-5 minutes per run.
      - uses: Swatinem/rust-cache@v2

      - name: Build (all targets)
        run: cargo build --all-targets

      - name: Test (all targets)
        run: cargo test --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Job 3: Dogfood — run polycrap on its own source ─────────────────────────
  dogfood:
    name: Dogfood (polycrap on itself)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Run polycrap on src/
        # Report all functions but don't fail — the tool reports on itself,
        # which is informative even if some functions are complex.
        # Change --threshold or add --fail-above here to enforce a quality gate.
        run: |
          ./target/release/polycrap \
            --path src/ \
            --threshold 30 \
            --exclude 'tests/**' \
            --format human \
            --summary
